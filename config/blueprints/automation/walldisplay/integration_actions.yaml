blueprint:
  name: WallDisplay Integration Actions v0.3.0
  description: >-
    Run user-defined Home Assistant actions from WallDisplay Sync integration events or other selected triggers.
    Use one automation for each action-only Footer Button event and another for external triggers that should press
    the integration's Wake Panel button. This blueprint complements the custom integration; it does not synchronize
    panel content.
  domain: automation
  input:
    triggers:
      name: Triggers
      description: >-
        Select the triggering conditions. For an action-only footer button, add a State trigger and select the
        matching WallDisplay Footer Button event entity. For a wake automation, select any external trigger.
      selector:
        trigger:
    actions:
      name: Actions
      description: >-
        Select the actions to run. To wake the display, add a Button: Press action targeting the integration's
        Wake Panel entity.
      selector:
        action:

mode: queued
max: 10

triggers: !input triggers
actions: !input actions
