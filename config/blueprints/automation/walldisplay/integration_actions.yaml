blueprint:
  name: WallDisplay Footer Action v0.3.1
  description: >-
    Run one user-defined Home Assistant action sequence from one specific WallDisplay Sync Footer Button event.
    Create a separate automation from this blueprint for each footer button that needs a different action. This
    blueprint complements the custom integration; it does not synchronize panel content.
  domain: automation
  input:
    footer_button:
      name: Footer button event
      description: Select the exact WallDisplay Footer Button event entity that should run these actions.
      selector:
        entity:
          domain: event
    actions:
      name: Actions
      description: Select the actions to run when the selected footer button is pressed.
      selector:
        action:

mode: queued
max: 10

triggers:
  - trigger: state
    entity_id: !input footer_button
actions: !input actions
