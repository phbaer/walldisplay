blueprint:
  name: WallDisplay MQTT Sync v0.5.0 (Contract 5)
  description: >-
    Publish panel name, clock, weather, rich media controls and favourites, dynamic footer button labels, and optional header measurement chips
    to a WallDisplay panel over MQTT. Also maps panel button command topics to Home Assistant actions.
  homeassistant:
    min_version: 2024.10.0
  domain: automation
  source_url: https://example.invalid/walldisplay/blueprint
  input:
    panel_topic:
      name: Panel MQTT topic prefix
      description: Base topic of the panel, e.g. panel/guition-4848s040
      selector:
        text:
    panel_name:
      name: Panel name
      description: Header title displayed on the panel.
      default: Living Room
      selector:
        text:
    time_format:
      name: Clock format
      description: Select 24-hour or 12-hour time for the panel header.
      default: "24h"
      selector:
        select:
          options:
            - label: 24-hour
              value: "24h"
            - label: 12-hour
              value: "12h"
    weather_entity:
      name: Weather entity
      selector:
        entity:
          domain: weather
    temperature_entity:
      name: Temperature sensor (optional)
      description: Overrides the weather entity temperature attribute.
      default: ""
      selector: {entity: {domain: sensor}}
    humidity_entity:
      name: Humidity sensor (optional)
      description: Overrides the weather entity humidity attribute.
      default: ""
      selector: {entity: {domain: sensor}}
    pressure_entity:
      name: Pressure sensor (optional)
      description: Overrides the weather entity pressure attribute.
      default: ""
      selector: {entity: {domain: sensor}}
    wind_speed_entity:
      name: Wind speed sensor (optional)
      description: Overrides the weather entity wind_speed attribute.
      default: ""
      selector: {entity: {domain: sensor}}
    rainfall_entity:
      name: Rainfall sensor (optional)
      description: Overrides the weather entity precipitation attribute.
      default: ""
      selector: {entity: {domain: sensor}}
    irradiance_entity:
      name: Solar irradiance sensor (optional)
      description: Overrides the weather entity irradiance attribute.
      default: ""
      selector: {entity: {domain: sensor}}
    media_entity:
      name: Media player entity
      selector:
        entity:
          domain: media_player
    media_favorite1_label:
      name: Media favourite 1 label
      default: ""
      selector: {text: {}}
    media_favorite1_icon:
      name: Media favourite 1 symbol
      default: radio
      selector: {select: {options: [none, radio, music, album, playlist, podcast]}}
    media_favorite1_payload:
      name: Media favourite 1 play-media payload
      description: JSON service data for media_player.play_media, for example {"media_content_id":"https://radio.example/stream.mp3","media_content_type":"music"}.
      default: ""
      selector: {text: {multiline: true}}
    media_favorite2_label:
      name: Media favourite 2 label
      default: ""
      selector: {text: {}}
    media_favorite2_icon:
      name: Media favourite 2 symbol
      default: radio
      selector: {select: {options: [none, radio, music, album, playlist, podcast]}}
    media_favorite2_payload:
      name: Media favourite 2 play-media payload
      description: JSON service data for media_player.play_media, for example {"media_content_id":"https://radio.example/stream.mp3","media_content_type":"music"}.
      default: ""
      selector: {text: {multiline: true}}
    media_favorite3_label:
      name: Media favourite 3 label
      default: ""
      selector: {text: {}}
    media_favorite3_icon:
      name: Media favourite 3 symbol
      default: radio
      selector: {select: {options: [none, radio, music, album, playlist, podcast]}}
    media_favorite3_payload:
      name: Media favourite 3 play-media payload
      description: JSON service data for media_player.play_media, for example {"media_content_id":"https://radio.example/stream.mp3","media_content_type":"music"}.
      default: ""
      selector: {text: {multiline: true}}
    media_favorite4_label:
      name: Media favourite 4 label
      default: ""
      selector: {text: {}}
    media_favorite4_icon:
      name: Media favourite 4 symbol
      default: radio
      selector: {select: {options: [none, radio, music, album, playlist, podcast]}}
    media_favorite4_payload:
      name: Media favourite 4 play-media payload
      description: JSON service data for media_player.play_media, for example {"media_content_id":"https://radio.example/stream.mp3","media_content_type":"music"}.
      default: ""
      selector: {text: {multiline: true}}
    media_favorite5_label:
      name: Media favourite 5 label
      default: ""
      selector: {text: {}}
    media_favorite5_icon:
      name: Media favourite 5 symbol
      default: radio
      selector: {select: {options: [none, radio, music, album, playlist, podcast]}}
    media_favorite5_payload:
      name: Media favourite 5 play-media payload
      description: JSON service data for media_player.play_media, for example {"media_content_id":"https://radio.example/stream.mp3","media_content_type":"music"}.
      default: ""
      selector: {text: {multiline: true}}
    dim_after:
      name: Dim display after
      description: Seconds without touch or wake activity before dimming. Set to 0 to disable dimming and screen-off.
      default: 300
      selector:
        number:
          min: 0
          max: 86400
          step: 1
          unit_of_measurement: s
          mode: box
    screen_off_after:
      name: Turn screen off after dimming
      description: Additional seconds at dim brightness before switching the backlight off. Set to 0 to remain dimmed.
      default: 600
      selector:
        number:
          min: 0
          max: 86400
          step: 1
          unit_of_measurement: s
          mode: box
    dim_brightness:
      name: Dim brightness
      description: Backlight percentage while dimmed.
      default: 20
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    wakeup_triggers:
      name: Wake-up triggers
      description: Optional Home Assistant triggers that restore full brightness and reset the inactivity timer. Multiple triggers are supported.
      default: []
      selector:
        trigger:
    chip1_sensor:
      name: Header measurement chip 1 sensor
      description: Optional. Leave empty to hide this chip.
      default: ""
      selector:
        entity:
          domain: sensor
    chip1_warn_above:
      name: Chip 1 warning threshold (>)
      default: 0
      selector:
        number:
          min: -1000
          max: 1000
          step: 0.1
          mode: box
    chip1_alert_above:
      name: Chip 1 alert threshold (>)
      default: 0
      selector:
        number:
          min: -1000
          max: 1000
          step: 0.1
          mode: box
    chip2_sensor:
      name: Header measurement chip 2 sensor
      description: Optional. Leave empty to hide this chip.
      default: ""
      selector:
        entity:
          domain: sensor
    chip2_warn_above:
      name: Chip 2 warning threshold (>)
      default: 0
      selector:
        number:
          min: -1000
          max: 1000
          step: 0.1
          mode: box
    chip2_alert_above:
      name: Chip 2 alert threshold (>)
      default: 0
      selector:
        number:
          min: -1000
          max: 1000
          step: 0.1
          mode: box
    chip3_sensor:
      name: Header measurement chip 3 sensor
      description: Optional. Leave empty to hide this chip.
      default: ""
      selector:
        entity:
          domain: sensor
    chip3_warn_above:
      name: Chip 3 warning threshold (>)
      default: 0
      selector:
        number:
          min: -1000
          max: 1000
          step: 0.1
          mode: box
    chip3_alert_above:
      name: Chip 3 alert threshold (>)
      default: 0
      selector:
        number:
          min: -1000
          max: 1000
          step: 0.1
          mode: box
    chip4_sensor:
      name: Header measurement chip 4 sensor
      description: Optional. Leave empty to hide this chip.
      default: ""
      selector:
        entity:
          domain: sensor
    chip4_warn_above:
      name: Chip 4 warning threshold (>)
      default: 0
      selector:
        number:
          min: -1000
          max: 1000
          step: 0.1
          mode: box
    chip4_alert_above:
      name: Chip 4 alert threshold (>)
      default: 0
      selector:
        number:
          min: -1000
          max: 1000
          step: 0.1
          mode: box
    chip_ok_color:
      name: Color payload for normal state
      description: Named value (ok/green/etc.) or hex like #2B8A3E
      default: ok
      selector:
        text:
    chip_warn_color:
      name: Color payload for warning state
      description: Named value (warn/amber/etc.) or hex like #A67E34
      default: warn
      selector:
        text:
    chip_alert_color:
      name: Color payload for alert state
      description: Named value (alert/red/etc.) or hex like #9F2E3A
      default: alert
      selector:
        text:
    chip_neutral_color:
      name: Color payload for non-numeric state
      description: Named value (neutral/blue/etc.) or hex like #171B21
      default: neutral
      selector:
        text:
    button1_label:
      name: Button 1 label
      default: ""
      selector:
        text:
    button1_state_entity:
      name: Button 1 state entity
      description: Optional toggleable entity. Its current state is shown on the panel and a panel or device-page press toggles it. Leave empty for an action-only button.
      default: ""
      selector:
        entity:
    button2_label:
      name: Button 2 label
      default: ""
      selector:
        text:
    button2_state_entity:
      name: Button 2 state entity
      description: Optional toggleable entity. Its current state is shown on the panel and a panel or device-page press toggles it. Leave empty for an action-only button.
      default: ""
      selector:
        entity:
    button3_label:
      name: Button 3 label
      default: ""
      selector:
        text:
    button3_state_entity:
      name: Button 3 state entity
      description: Optional toggleable entity. Its current state is shown on the panel and a panel or device-page press toggles it. Leave empty for an action-only button.
      default: ""
      selector:
        entity:
    button4_label:
      name: Button 4 label
      default: ""
      selector:
        text:
    button4_state_entity:
      name: Button 4 state entity
      description: Optional toggleable entity. Its current state is shown on the panel and a panel or device-page press toggles it. Leave empty for an action-only button.
      default: ""
      selector:
        entity:
    button5_label:
      name: Button 5 label
      default: ""
      selector:
        text:
    button5_state_entity:
      name: Button 5 state entity
      description: Optional toggleable entity. Its current state is shown on the panel and a panel or device-page press toggles it. Leave empty for an action-only button.
      default: ""
      selector:
        entity:
    button1_action:
      name: Button 1 action
      default: []
      selector:
        action: {}
    button2_action:
      name: Button 2 action
      default: []
      selector:
        action: {}
    button3_action:
      name: Button 3 action
      default: []
      selector:
        action: {}
    button4_action:
      name: Button 4 action
      default: []
      selector:
        action: {}
    button5_action:
      name: Button 5 action
      default: []
      selector:
        action: {}

# Preserve every panel trigger in order without an intentional debounce delay.
# In particular, a press must never be discarded while a synchronization runs.
mode: queued
max: 20
max_exceeded: warning
trace:
  stored_traces: 20

variables:
  blueprint_version: "0.5.0"
  panel_contract_version: "5"
  panel_topic: !input panel_topic
  panel_name: !input panel_name
  time_format: !input time_format
  weather_entity: !input weather_entity
  temperature_entity: !input temperature_entity
  humidity_entity: !input humidity_entity
  pressure_entity: !input pressure_entity
  wind_speed_entity: !input wind_speed_entity
  rainfall_entity: !input rainfall_entity
  irradiance_entity: !input irradiance_entity
  media_entity: !input media_entity
  media_favorite1_label: !input media_favorite1_label
  media_favorite1_icon: !input media_favorite1_icon
  media_favorite1_payload: !input media_favorite1_payload
  media_favorite2_label: !input media_favorite2_label
  media_favorite2_icon: !input media_favorite2_icon
  media_favorite2_payload: !input media_favorite2_payload
  media_favorite3_label: !input media_favorite3_label
  media_favorite3_icon: !input media_favorite3_icon
  media_favorite3_payload: !input media_favorite3_payload
  media_favorite4_label: !input media_favorite4_label
  media_favorite4_icon: !input media_favorite4_icon
  media_favorite4_payload: !input media_favorite4_payload
  media_favorite5_label: !input media_favorite5_label
  media_favorite5_icon: !input media_favorite5_icon
  media_favorite5_payload: !input media_favorite5_payload
  dim_after: !input dim_after
  screen_off_after: !input screen_off_after
  dim_brightness: !input dim_brightness
  chip1_sensor: !input chip1_sensor
  chip1_warn_above: !input chip1_warn_above
  chip1_alert_above: !input chip1_alert_above
  chip2_sensor: !input chip2_sensor
  chip2_warn_above: !input chip2_warn_above
  chip2_alert_above: !input chip2_alert_above
  chip3_sensor: !input chip3_sensor
  chip3_warn_above: !input chip3_warn_above
  chip3_alert_above: !input chip3_alert_above
  chip4_sensor: !input chip4_sensor
  chip4_warn_above: !input chip4_warn_above
  chip4_alert_above: !input chip4_alert_above
  chip_ok_color: !input chip_ok_color
  chip_warn_color: !input chip_warn_color
  chip_alert_color: !input chip_alert_color
  chip_neutral_color: !input chip_neutral_color
  button1_label: !input button1_label
  button1_state_entity: !input button1_state_entity
  button2_label: !input button2_label
  button2_state_entity: !input button2_state_entity
  button3_label: !input button3_label
  button3_state_entity: !input button3_state_entity
  button4_label: !input button4_label
  button4_state_entity: !input button4_state_entity
  button5_label: !input button5_label
  button5_state_entity: !input button5_state_entity

trigger_variables:
  panel_topic: !input panel_topic

triggers:
  - id: startup
    trigger: homeassistant
    event: start

  - id: automation_reload
    trigger: event
    event_type: automation_reloaded

  - id: panel_online
    trigger: mqtt
    topic: "{{ panel_topic }}/status"
    payload: "online"

  - id: panel_sync
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/sync"

  - triggers: !input wakeup_triggers

  - id: clock
    trigger: time_pattern
    minutes: "/1"

  # Input changes in a UI-created blueprint automation do not emit an event.
  # Refreshing guarantees labels and state configuration reach the panel without
  # creating an immediate MQTT burst.
  - id: panel_refresh
    trigger: time_pattern
    minutes: "/5"

  - id: weather
    trigger: state
    entity_id: !input weather_entity

  - id: weather_refresh
    trigger: time_pattern
    minutes: "/30"

  - id: media
    trigger: state
    entity_id: !input media_entity

  - id: chip1
    trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input chip1_sensor

  - id: chip2
    trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input chip2_sensor

  - id: chip3
    trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input chip3_sensor

  - id: chip4
    trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input chip4_sensor

  - id: btn1_press
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/button1"

  - id: btn2_press
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/button2"

  - id: btn3_press
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/button3"

  - id: btn4_press
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/button4"

  - id: btn5_press
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/button5"

  - id: media_previous
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/media/previous"
  - id: media_play_pause
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/media/play_pause"
  - id: media_next
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/media/next"
  - id: media_volume_down
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/media/volume_down"
  - id: media_volume_up
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/media/volume_up"
  - id: media_favorite1
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/media/favorite1"
  - id: media_favorite2
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/media/favorite2"
  - id: media_favorite3
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/media/favorite3"
  - id: media_favorite4
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/media/favorite4"
  - id: media_favorite5
    trigger: mqtt
    topic: "{{ panel_topic }}/cmd/media/favorite5"

  # Do not subscribe to the global state_changed event: it queues a run for
  # every entity in Home Assistant. Each optional footer button instead filters
  # the state_changed event by entity_id; an empty optional input simply matches
  # no events and is valid in the event payload.
  - id: button1_state
    trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input button1_state_entity

  - id: button2_state
    trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input button2_state_entity

  - id: button3_state
    trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input button3_state_entity

  - id: button4_state
    trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input button4_state_entity

  - id: button5_state
    trigger: event
    event_type: state_changed
    event_data:
      entity_id: !input button5_state_entity

actions:
  - choose:
      - conditions: "{{ trigger.id in ['startup', 'automation_reload', 'panel_online', 'panel_sync', 'panel_refresh'] }}"
        sequence:
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/name"
              qos: 1
              retain: true
              payload: "{{ panel_name }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/blueprint_info"
              qos: 1
              retain: true
              payload: "{{ {'version': blueprint_version, 'contract': panel_contract_version} | tojson }}"
          - action: mqtt.publish
            data: {topic: "{{ panel_topic }}/set/media/favorite1/label", qos: 1, retain: true, payload: "{{ media_favorite1_label }}"}
          - action: mqtt.publish
            data: {topic: "{{ panel_topic }}/set/media/favorite1/icon", qos: 1, retain: true, payload: "{{ media_favorite1_icon }}"}
          - action: mqtt.publish
            data: {topic: "{{ panel_topic }}/set/media/favorite2/label", qos: 1, retain: true, payload: "{{ media_favorite2_label }}"}
          - action: mqtt.publish
            data: {topic: "{{ panel_topic }}/set/media/favorite2/icon", qos: 1, retain: true, payload: "{{ media_favorite2_icon }}"}
          - action: mqtt.publish
            data: {topic: "{{ panel_topic }}/set/media/favorite3/label", qos: 1, retain: true, payload: "{{ media_favorite3_label }}"}
          - action: mqtt.publish
            data: {topic: "{{ panel_topic }}/set/media/favorite3/icon", qos: 1, retain: true, payload: "{{ media_favorite3_icon }}"}
          - action: mqtt.publish
            data: {topic: "{{ panel_topic }}/set/media/favorite4/label", qos: 1, retain: true, payload: "{{ media_favorite4_label }}"}
          - action: mqtt.publish
            data: {topic: "{{ panel_topic }}/set/media/favorite4/icon", qos: 1, retain: true, payload: "{{ media_favorite4_icon }}"}
          - action: mqtt.publish
            data: {topic: "{{ panel_topic }}/set/media/favorite5/label", qos: 1, retain: true, payload: "{{ media_favorite5_label }}"}
          - action: mqtt.publish
            data: {topic: "{{ panel_topic }}/set/media/favorite5/icon", qos: 1, retain: true, payload: "{{ media_favorite5_icon }}"}
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/display_power"
              qos: 1
              retain: true
              payload: "{{ {'dim_after': dim_after | int, 'off_after': screen_off_after | int, 'dim_percent': dim_brightness | int} | tojson }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/button1/label"
              qos: 1
              retain: true
              payload: "{{ button1_label }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/button1/state"
              qos: 1
              retain: true
              payload: "{{ states(button1_state_entity) if button1_state_entity | length > 0 else 'stateless' }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/button2/label"
              qos: 1
              retain: true
              payload: "{{ button2_label }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/button2/state"
              qos: 1
              retain: true
              payload: "{{ states(button2_state_entity) if button2_state_entity | length > 0 else 'stateless' }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/button3/label"
              qos: 1
              retain: true
              payload: "{{ button3_label }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/button3/state"
              qos: 1
              retain: true
              payload: "{{ states(button3_state_entity) if button3_state_entity | length > 0 else 'stateless' }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/button4/label"
              qos: 1
              retain: true
              payload: "{{ button4_label }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/button4/state"
              qos: 1
              retain: true
              payload: "{{ states(button4_state_entity) if button4_state_entity | length > 0 else 'stateless' }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/button5/label"
              qos: 1
              retain: true
              payload: "{{ button5_label }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/button5/state"
              qos: 1
              retain: true
              payload: "{{ states(button5_state_entity) if button5_state_entity | length > 0 else 'stateless' }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/clock"
              qos: 1
              retain: true
              payload: "{{ now().strftime('%-I:%M %p' if time_format == '12h' else '%H:%M') }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/date"
              qos: 1
              retain: true
              payload: "{{ now().strftime('%a, %d %b') }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/chip1"
              qos: 1
              retain: true
              payload: "{{ states(chip1_sensor) ~ (' ' ~ state_attr(chip1_sensor, 'unit_of_measurement') if state_attr(chip1_sensor, 'unit_of_measurement') else '') if chip1_sensor | length > 0 else '' }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/chip1/color"
              qos: 1
              retain: true
              payload: >-
                {% set raw = states(chip1_sensor) %}
                {% set val = raw | float(default=none) %}
                {% if val is number %}
                  {% if val > chip1_alert_above %}{{ chip_alert_color }}
                  {% elif val > chip1_warn_above %}{{ chip_warn_color }}
                  {% else %}{{ chip_ok_color }}{% endif %}
                {% else %}{{ chip_neutral_color }}{% endif %}
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/chip2"
              qos: 1
              retain: true
              payload: "{{ states(chip2_sensor) ~ (' ' ~ state_attr(chip2_sensor, 'unit_of_measurement') if state_attr(chip2_sensor, 'unit_of_measurement') else '') if chip2_sensor | length > 0 else '' }}"
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/chip2/color"
              qos: 1
              retain: true
              payload: >-
                {% set raw = states(chip2_sensor) %}
                {% set val = raw | float(default=none) %}
