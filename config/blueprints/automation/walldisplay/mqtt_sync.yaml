  - choose:
      - conditions: "{{ trigger.id in ['weather', 'weather_refresh', 'startup', 'panel_online', 'panel_sync'] }}"
        sequence:
          - action: weather.get_forecasts
            target:
              entity_id: !input weather_entity
            data:
              type: daily
            response_variable: daily_forecast
          - action: recorder.get_statistics
            data:
              statistic_ids:
                - "{{ temperature_entity if temperature_entity | length > 0 else weather_entity }}"
              start_time: "{{ (now() - timedelta(hours=24)).isoformat() }}"
              end_time: "{{ now().isoformat() }}"
              period: hour
              types: [mean]
            response_variable: temperature_history
            continue_on_error: true
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/weather"
              qos: 1
              retain: true
              payload: >-
                {% set condition = states(weather_entity) %}
                {% set temp = (states(temperature_entity) if temperature_entity | length > 0 else state_attr(weather_entity, 'temperature')) | float(none) %}
                {% set forecast = daily_forecast[weather_entity]['forecast'] | default([], true) %}
                {% set trend_entity = temperature_entity if temperature_entity | length > 0 else weather_entity %}
                {% set history = (temperature_history | default({}, true)).get('statistics', {}).get(trend_entity, []) %}
                {% set humidity = states(humidity_entity) if humidity_entity | length > 0 else state_attr(weather_entity, 'humidity') %}
                {% set pressure = states(pressure_entity) if pressure_entity | length > 0 else state_attr(weather_entity, 'pressure') %}
                {% set wind_speed = states(wind_speed_entity) if wind_speed_entity | length > 0 else state_attr(weather_entity, 'wind_speed') %}
                {% set wind_unit = state_attr(wind_speed_entity, 'unit_of_measurement') if wind_speed_entity | length > 0 else state_attr(weather_entity, 'wind_speed_unit') %}
                {% set rainfall = states(rainfall_entity) if rainfall_entity | length > 0 else state_attr(weather_entity, 'precipitation') %}
                {% set rainfall_unit = state_attr(rainfall_entity, 'unit_of_measurement') if rainfall_entity | length > 0 else state_attr(weather_entity, 'precipitation_unit') %}
                {% set irradiance = states(irradiance_entity) if irradiance_entity | length > 0 else state_attr(weather_entity, 'irradiance') %}
                {% set irradiance_unit = state_attr(irradiance_entity, 'unit_of_measurement') if irradiance_entity | length > 0 else state_attr(weather_entity, 'irradiance_unit') %}
                {% set ns = namespace(days=[], trend=[]) %}
                {% for item in history %}
                  {% if item.mean is number %}
                    {% set ns.trend = ns.trend + [item.mean] %}
                  {% endif %}
                {% endfor %}
                {% if temp is number and (ns.trend | count == 0 or ns.trend[-1] != temp) %}
                  {% set ns.trend = ns.trend + [temp] %}
                {% endif %}
                {% for item in forecast[1:4] %}
                  {% set ns.days = ns.days + [{
                    'day': as_datetime(item.datetime).strftime('%a'),
                    'condition': item.condition,
                    'high': item.temperature,
                    'low': item.templow | default(item.temperature, true)
                  }] %}
                {% endfor %}
                {{ {
                  'condition': condition,
                  'temperature': temp if temp is number else none,
                  'humidity': humidity | float(none),
                  'pressure': pressure | float(none),
                  'wind_speed': wind_speed | float(none),
                  'wind_unit': wind_unit | default('', true),
                  'rainfall': rainfall | float(none),
                  'rainfall_unit': rainfall_unit | default('', true),
                  'irradiance': irradiance | float(none),
                  'irradiance_unit': irradiance_unit | default('', true),
                  'trend': ns.trend[-25:],
                  'forecast': ns.days
                } | tojson }}

  - choose:
      - conditions: "{{ trigger.id in ['media', 'startup', 'panel_online', 'panel_sync'] }}"
        sequence:
          - action: mqtt.publish
            data:
              topic: "{{ panel_topic }}/set/media"
              qos: 1
              retain: true
              payload: >-
                {% set state = states(media_entity) %}
                {% set title = state_attr(media_entity, 'media_title') %}
                {% set artist = state_attr(media_entity, 'media_artist') %}
                {% set artwork_url = state_attr(media_entity, 'entity_picture') | default(state_attr(media_entity, 'media_image_url') | default('', true), true) %}
                {% set home_assistant_url = config.internal_url | default(config.external_url | default('', true), true) | regex_replace('/$', '') %}
                {{ {
                  'state': state,
                  'title': title if title else ('Media idle' if state in ['off', 'idle', 'standby'] else state | title),
                  'artist': artist if artist else '',
                  'album': state_attr(media_entity, 'media_album_name') | default('', true),
                  'source': state_attr(media_entity, 'source') | default('', true),
                  'artwork_url': (
                    artwork_url
                    if artwork_url.startswith(('http://', 'https://'))
                    else (
                      home_assistant_url ~ artwork_url
                      if artwork_url.startswith('/') else ''
                    )
                  )
                } | tojson }}

