# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{%- for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits -%}
- {% if commit.breaking %}⚠️ **BREAKING** {% endif %}{{ commit.message | split(pat="\n") | first | upper_first }}
{% endfor %}
{%- endfor %}\n
"""

footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false

commit_parsers = [
  { message = "^feat", group = "🚀 Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^refactor", group = "🔨 Refactoring" },
  { message = "^test", group = "🧪 Testing" },
  { message = "^docs", group = "📚 Documentation" },
  { message = "^chore\\(deps\\)", group = "📦 Dependencies" },
  { message = "^chore", group = "🔧 Maintenance" },
  { message = "^ci", group = "🔧 Maintenance" },
  { message = "^style", group = "💅 Style" },
  { message = "^Merge pull request 'Update dependency", group = "📦 Dependencies", skip = false },
  { message = "^Merge pull request 'Update .+ action", group = "📦 Dependencies", skip = false },
  { message = "^Merge pull request 'Update .+ Docker", group = "📦 Dependencies", skip = false },
  { message = "^Merge pull request", group = "🔀 Merged PRs", skip = false },
  { message = "^Merge branch", skip = true },
  { body = ".*security", group = "🔒 Security" },
  { message = "^chore: update changelog", skip = true },
]

commit_preprocessors = [
  { pattern = "\nReviewed-on:.*", replace = "" },
  { pattern = "\nCo-authored-by:.*", replace = "" },
  { pattern = "\n\n", replace = "" },
]

protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
